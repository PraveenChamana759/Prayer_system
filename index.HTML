<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NITW EU Prayer System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#1e3a8a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0 15px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{min-height:70px;}

button{
background:#1e3a8a;
color:white;
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#162d6b;}

.submit-btn{
background:#16a34a;
font-size:18px;
font-weight:bold;
padding:14px 25px;
}

.logout{
background:#dc2626;
float:right;
}

.success-box{
background:#ecfdf5;
color:#065f46;
padding:15px;
border-radius:8px;
margin-top:15px;
}
.hidden{display:none;}
</style>
</head>

<body>

<header>
✨ NIT Warangal EU Prayer Management ✨
</header>

<div class="container">

<!-- LOGIN SECTION -->
<div id="loginSection" class="card">
<h2>🔐 Login</h2>

<select id="role">
<option value="user">User</option>
<option value="secretary">Secretary</option>
</select>

<input type="text" id="loginName" placeholder="Enter Name">

<input type="password" id="loginPass" placeholder="Password (Secretary only)">

<button onclick="login()">Login</button>
</div>

<!-- USER SECTION -->
<div id="userSection" class="hidden">

<button class="logout" onclick="logout()">Logout</button>

<div class="card">
<h2>🙌 Submit Praising & Prayer</h2>

<select id="userMonth"></select>
<select id="userYear"></select>

<h3>🙌 Praising Points</h3>
<div id="praisingContainer"></div>
<button onclick="addPraising()">+ Add Praising</button>

<h3>🙏 Prayer Points</h3>
<div id="prayerContainer"></div>
<button onclick="addPrayer()">+ Add Prayer</button>

<br><br>
<button class="submit-btn" onclick="submitPrayer()">Submit 🙏</button>

<div id="successMsg"></div>
</div>

</div>

<!-- SECRETARY SECTION -->
<div id="secretarySection" class="hidden">

<button class="logout" onclick="logout()">Logout</button>

<div class="card">
<h2>📄 Generate Prayer Letter</h2>

<select id="filterMonth"></select>
<select id="filterYear"></select>

<button onclick="downloadPDF()">Download Official Letter</button>
</div>

</div>

</div>

<script>

/* SECRETARY PASSWORD */
const SECRETARY_PASSWORD = "nitw123";

/* STORAGE INIT */
if(!localStorage.getItem("prayers")){
localStorage.setItem("prayers",JSON.stringify([]));
}

const months=["January","February","March","April","May","June",
"July","August","September","October","November","December"];

document.addEventListener("DOMContentLoaded",function(){
populateMonthYear();
});

/* LOGIN FUNCTION */
function login(){

const role=document.getElementById("role").value;
const name=document.getElementById("loginName").value.trim();
const pass=document.getElementById("loginPass").value;

if(!name){
alert("Enter name first 🙏");
return;
}

if(role==="secretary" && pass!==SECRETARY_PASSWORD){
alert("Wrong Secretary Password ❌");
return;
}

localStorage.setItem("currentUser",name);
localStorage.setItem("currentRole",role);

showSection(role);
}

/* SHOW SECTION */
function showSection(role){
document.getElementById("loginSection").classList.add("hidden");

if(role==="user"){
document.getElementById("userSection").classList.remove("hidden");
initializeFields();
}else{
document.getElementById("secretarySection").classList.remove("hidden");
}
}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
localStorage.removeItem("currentRole");
location.reload();
}

/* MONTH/YEAR */
function populateMonthYear(){
months.forEach(m=>{
userMonth.innerHTML+=`<option>${m}</option>`;
filterMonth.innerHTML+=`<option>${m}</option>`;
});
const currentYear=new Date().getFullYear();
for(let y=currentYear-5;y<=currentYear+5;y++){
userYear.innerHTML+=`<option>${y}</option>`;
filterYear.innerHTML+=`<option>${y}</option>`;
}
}

/* USER FUNCTIONS */
function initializeFields(){
praisingContainer.innerHTML="";
prayerContainer.innerHTML="";
addPraising();addPraising();
addPrayer();addPrayer();
}

function addPraising(){
const t=document.createElement("textarea");
praisingContainer.appendChild(t);
}

function addPrayer(){
const t=document.createElement("textarea");
prayerContainer.appendChild(t);
}

function submitPrayer(){

const name=localStorage.getItem("currentUser");
const m=userMonth.value;
const y=userYear.value;

const praising=[...document.querySelectorAll("#praisingContainer textarea")]
.map(t=>t.value.trim()).filter(v=>v!="");

const prayer=[...document.querySelectorAll("#prayerContainer textarea")]
.map(t=>t.value.trim()).filter(v=>v!="");

if(prayer.length===0){
alert("Please add at least one prayer 🙏");
return;
}

const prayers=JSON.parse(localStorage.getItem("prayers"));
prayers.push({name,month:m,year:y,praising,prayer});
localStorage.setItem("prayers",JSON.stringify(prayers));

successMsg.innerHTML=`
<div class="success-box">
✨ Thank you for submitting! 🙌<br>
Heaven’s inbox updated 📩✨<br>
Keep trusting — God’s got this 🙏🔥
</div>
`;

initializeFields();
}

/* PDF */
function downloadPDF(){

const { jsPDF } = window.jspdf;
const doc=new jsPDF();

const selectedMonth=filterMonth.value;
const selectedYear=filterYear.value;

const data=JSON.parse(localStorage.getItem("prayers"))
.filter(p=>p.month===selectedMonth && p.year===selectedYear);

let y=20;

doc.setFontSize(14);
doc.text("NIT Warangal EU Prayer Letter",20,y);
y+=10;

doc.setFontSize(11);

data.forEach(person=>{
doc.text("Name: "+person.name,20,y);
y+=7;

doc.text("Prayer Points:",20,y);
y+=7;

person.prayer.forEach((pt,i)=>{
doc.text((i+1)+". "+pt,25,y);
y+=6;
});

y+=8;
});

doc.save("Prayer_Letter.pdf");
}

</script>
</body>
</html>
