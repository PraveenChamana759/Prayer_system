<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Management System - NITW EU</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  background:#f4f6f9;
}

header{
  background:#1e3a8a;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header img{ height:60px; }

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:8px 0 15px;
  border-radius:6px;
  border:1px solid #ccc;
}

textarea{ min-height:70px; }

button{
  background:#1e3a8a;
  color:white;
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

button:hover{ background:#162d6b; }

.submit-btn{
  background:#16a34a;
  padding:14px 30px;
  font-size:18px;
  font-weight:bold;
}

.submit-btn:hover{ background:#15803d; }

.hidden{ display:none; }

.role-switch{ text-align:center; margin-bottom:20px; }

.success-box{
  background:#ecfdf5;
  color:#065f46;
  padding:15px;
  border-radius:8px;
  margin-top:15px;
  font-weight:500;
}
</style>
</head>

<body>

<header>
  <div style="font-size:20px;font-weight:bold;">
    ✨ Prayer Management System - NITW EU ✨
  </div>
  <img src="logo.png">
</header>

<div class="container">

<div class="role-switch">
  <button onclick="showUser()">User</button>
  <button onclick="showSecretary()">Secretary</button>
</div>

<!-- USER SECTION -->
<div id="userSection" class="card">

<h2>🙌 Submit Your Praising & Prayer</h2>

<label>Name</label>
<input type="text" id="name">

<label>Month</label>
<select id="userMonth"></select>

<label>Year</label>
<select id="userYear"></select>

<h3>🙌 Praising Points</h3>
<div id="praisingContainer"></div>
<button onclick="addPraising()">+ Add More Praising</button>

<h3>🙏 Prayer Points</h3>
<div id="prayerContainer"></div>
<button onclick="addPrayer()">+ Add More Prayer</button>

<br><br>
<button class="submit-btn" onclick="submitPrayer()">Submit 🙏</button>

<div id="successMsg"></div>

</div>

<!-- SECRETARY LOGIN -->
<div id="secretaryLogin" class="card hidden">
<h2>🔐 Secretary Login</h2>
<input type="password" id="secPass" placeholder="Enter Password">
<button onclick="loginSecretary()">Login</button>
</div>

<!-- SECRETARY DASHBOARD -->
<div id="secretaryDashboard" class="hidden">
<div class="card">

<h3>Secretary Name</h3>
<input type="text" id="secName" placeholder="Enter Your Name">

<h3>Do you have any Special Praising Points? 🙌</h3>
<select id="secPraiseOption" onchange="toggleSecPraising()">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<div id="secPraisingSection" class="hidden">
<div id="secPraisingContainer"></div>
<button onclick="addSecPraising()">+ Add Special Praising</button>
</div>

<h3>Do you have any Special Prayer Points? 🙏</h3>
<select id="secPrayerOption" onchange="toggleSecPrayer()">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<div id="secPrayerSection" class="hidden">
<div id="secPrayerContainer"></div>
<button onclick="addSecPrayer()">+ Add Special Prayer</button>
</div>

<hr>

<h2>📄 Generate Monthly Prayer Letter</h2>
<select id="filterMonth"></select>
<select id="filterYear"></select>

<button onclick="downloadPDF()">Download Official Prayer Letter 📥</button>

</div>
</div>

</div>

<script>

/* STORAGE */
if(!localStorage.getItem("prayers")){
localStorage.setItem("prayers", JSON.stringify([]));
}

const months=["January","February","March","April","May","June",
"July","August","September","October","November","December"];

document.addEventListener("DOMContentLoaded",function(){
initializeFields();
populateMonthYear();
});

/* Populate Month & Year */
function populateMonthYear(){
months.forEach(m=>{
userMonth.innerHTML+=`<option>${m}</option>`;
filterMonth.innerHTML+=`<option>${m}</option>`;
});
const year=new Date().getFullYear();
for(let y=year-5;y<=year+5;y++){
userYear.innerHTML+=`<option>${y}</option>`;
filterYear.innerHTML+=`<option>${y}</option>`;
}
}

/* Initialize Default Fields */
function initializeFields(){
praisingContainer.innerHTML="";
prayerContainer.innerHTML="";
addPraising(); addPraising();
addPrayer(); addPrayer();
}

/* Role Switch */
function showUser(){
userSection.classList.remove("hidden");
secretaryLogin.classList.add("hidden");
secretaryDashboard.classList.add("hidden");
}

function showSecretary(){
userSection.classList.add("hidden");
secretaryLogin.classList.remove("hidden");
}

function loginSecretary(){
if(secPass.value==="admin123"){
secretaryLogin.classList.add("hidden");
secretaryDashboard.classList.remove("hidden");
}else alert("Incorrect password ❌");
}

/* Add Fields */
function addPraising(){ praisingContainer.appendChild(document.createElement("textarea")); }
function addPrayer(){ prayerContainer.appendChild(document.createElement("textarea")); }
function addSecPraising(){ secPraisingContainer.appendChild(document.createElement("textarea")); }
function addSecPrayer(){ secPrayerContainer.appendChild(document.createElement("textarea")); }

/* Toggle Secretary Sections */
function toggleSecPraising(){
if(secPraiseOption.value==="yes"){
secPraisingSection.classList.remove("hidden");
if(secPraisingContainer.children.length===0){
addSecPraising(); addSecPraising();
}
}else{
secPraisingSection.classList.add("hidden");
secPraisingContainer.innerHTML="";
}
}

function toggleSecPrayer(){
if(secPrayerOption.value==="yes"){
secPrayerSection.classList.remove("hidden");
if(secPrayerContainer.children.length===0){
addSecPrayer(); addSecPrayer();
}
}else{
secPrayerSection.classList.add("hidden");
secPrayerContainer.innerHTML="";
}
}

/* Submit Prayer */
function submitPrayer(){

const n=name.value.trim();
const m=userMonth.value;
const y=userYear.value;

const praising=[...praisingContainer.querySelectorAll("textarea")]
.map(t=>t.value.trim()).filter(v=>v!="");

const prayer=[...prayerContainer.querySelectorAll("textarea")]
.map(t=>t.value.trim()).filter(v=>v!="");

if(!n||prayer.length===0){
alert("Please fill required fields 🙏");
return;
}

const prayers=JSON.parse(localStorage.getItem("prayers"));
prayers.push({name:n,month:m,year:y,praising,prayer});
localStorage.setItem("prayers",JSON.stringify(prayers));

successMsg.innerHTML=`
<div class="success-box">
✨ Thank you for submitting! 🙌<br><br>
Your faith move has been received 💚<br>
Heaven's inbox just got updated 📩✨<br><br>
Keep trusting. Keep praying. God’s got this 🙏🔥
</div>
`;

name.value="";
initializeFields();
}

/* PDF GENERATION */
function downloadPDF(){

const { jsPDF } = window.jspdf;
const doc=new jsPDF();

const selectedMonth=filterMonth.value;
const selectedYear=filterYear.value;

const data=JSON.parse(localStorage.getItem("prayers"))
.filter(p=>p.month===selectedMonth && p.year===selectedYear);

const secN=secName.value||"Prayer Secretary";

let secPraise=[];
let secPrayer=[];

if(secPraiseOption.value==="yes"){
secPraise=[...secPraisingContainer.querySelectorAll("textarea")]
.map(t=>t.value.trim()).filter(v=>v!="");
}

if(secPrayerOption.value==="yes"){
secPrayer=[...secPrayerContainer.querySelectorAll("textarea")]
.map(t=>t.value.trim()).filter(v=>v!="");
}

let y=20;

doc.setFontSize(16);
doc.setFont(undefined,"bold");
doc.text("UESI – TS | NIT WARANGAL EU",105,y,{align:"center"});
y+=10;

doc.setFontSize(14);
doc.text("Monthly Prayer Letter - "+selectedMonth+" "+selectedYear,105,y,{align:"center"});
y+=15;

doc.setFontSize(12);
doc.setFont(undefined,"normal");
doc.text("Dear Brother/Sister in Christ,",20,y);
y+=10;

/* Secretary Praising */
if(secPraise.length>0){
doc.setFont(undefined,"bold");
doc.text("🙌 Praise God for:",20,y);
doc.setFont(undefined,"normal");
y+=8;

secPraise.forEach((p,i)=>{
if(y>280){doc.addPage();y=20;}
doc.text((i+1)+". "+p,25,y);
y+=7;
});
y+=5;
}

/* Secretary Prayer */
if(secPrayer.length>0){
doc.setFont(undefined,"bold");
doc.text("🙏 Special Prayer Points:",20,y);
doc.setFont(undefined,"normal");
y+=8;

secPrayer.forEach((p,i)=>{
if(y>280){doc.addPage();y=20;}
doc.text((i+1)+". "+p,25,y);
y+=7;
});
y+=5;
}

/* Personal Prayer */
if(data.length>0){
doc.setFont(undefined,"bold");
doc.text("🙏 Personal Prayer Requests:",20,y);
doc.setFont(undefined,"normal");
y+=8;

data.forEach(person=>{
if(y>280){doc.addPage();y=20;}

doc.setFont(undefined,"bold");
doc.text("Name: "+person.name,20,y);
doc.setFont(undefined,"normal");
y+=7;

person.prayer.forEach((pt,i)=>{
if(y>280){doc.addPage();y=20;}
doc.text((i+1)+". "+pt,25,y);
y+=6;
});
y+=5;
});
}

y+=10;
doc.text("Thank you for partnering in prayer 🙏",20,y);
y+=8;
doc.text("Yours in His grace,",20,y);
y+=8;
doc.text(secN,20,y);
y+=8;
doc.text("NIT Warangal EU - Prayer Secretary",20,y);

doc.save("Prayer_Letter_"+selectedMonth+"_"+selectedYear+".pdf");
}

</script>
</body>
</html>
