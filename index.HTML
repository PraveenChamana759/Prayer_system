<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Management System - NITW EU</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: #1e3a8a;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header .left-title {
  font-size: 20px;
  font-weight: bold;
}

header img {
  height: 60px;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

textarea { min-height: 70px; }

button {
  background: #1e3a8a;
  color: white;
  padding: 8px 15px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 5px;
}

button:hover { background: #162d6b; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #1e3a8a;
  color: white;
}

.hidden { display: none; }
.role-switch { text-align:center; margin-bottom:20px; }
</style>
</head>

<body>

<header>
  <div class="left-title">
    Prayer Management System - NITW EU
  </div>
  <img src="/mnt/data/5101323c-550e-4b02-b917-1ba63506bf7e.png">
</header>

<div class="container">

<div class="role-switch">
  <button onclick="showUser()">User</button>
  <button onclick="showSecretary()">Secretary</button>
</div>

<!-- ================= USER SECTION ================= -->
<div id="userSection" class="card">

<h2>Submit Prayer Request</h2>

<label>Name</label>
<input type="text" id="name">

<label>Month</label>
<select id="userMonth"></select>

<label>Year</label>
<select id="userYear"></select>

<h3>🙌 Praising Points</h3>
<div id="praisingContainer"></div>
<button onclick="addPraising()">Add More Praising Points</button>

<h3>🙏 Prayer Points</h3>
<div id="prayerContainer"></div>
<button onclick="addPrayer()">Add More Prayer Points</button>

<br><br>
<button onclick="submitPrayer()">Submit</button>
<p id="successMsg" style="color:green;"></p>

</div>

<!-- ================= SECRETARY LOGIN ================= -->
<div id="secretaryLogin" class="card hidden">
<h2>Secretary Login</h2>
<input type="password" id="secPass" placeholder="Enter Password">
<button onclick="loginSecretary()">Login</button>
</div>

<!-- ================= SECRETARY DASHBOARD ================= -->
<div id="secretaryDashboard" class="hidden">

<div class="card">
<h2>Fetch Monthly Data</h2>

<select id="filterMonth"></select>
<select id="filterYear"></select>

<button onclick="displayData()">Fetch Data</button>
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="displayArea"></div>
</div>

</div>

</div>

<script>

/* STORAGE */
if(!localStorage.getItem("prayers")){
  localStorage.setItem("prayers", JSON.stringify([]));
}

/* MONTHS LIST */
const months = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];

/* INITIALIZE */
document.addEventListener("DOMContentLoaded", function () {
    initializeFields();
    populateMonthYear();
});

/* POPULATE MONTH & YEAR DROPDOWNS */
function populateMonthYear(){
  const userMonth = document.getElementById("userMonth");
  const filterMonth = document.getElementById("filterMonth");

  months.forEach(m=>{
    userMonth.innerHTML += `<option value="${m}">${m}</option>`;
    filterMonth.innerHTML += `<option value="${m}">${m}</option>`;
  });

  const currentYear = new Date().getFullYear();
  const userYear = document.getElementById("userYear");
  const filterYear = document.getElementById("filterYear");

  for(let y=currentYear-5; y<=currentYear+5; y++){
    userYear.innerHTML += `<option value="${y}">${y}</option>`;
    filterYear.innerHTML += `<option value="${y}">${y}</option>`;
  }
}

/* DEFAULT 2 FIELDS */
function initializeFields(){
  document.getElementById("praisingContainer").innerHTML="";
  document.getElementById("prayerContainer").innerHTML="";

  addPraising(); addPraising();
  addPrayer(); addPrayer();
}

/* ROLE SWITCH */
function showUser(){
  document.getElementById("userSection").classList.remove("hidden");
  document.getElementById("secretaryLogin").classList.add("hidden");
  document.getElementById("secretaryDashboard").classList.add("hidden");
}

function showSecretary(){
  document.getElementById("userSection").classList.add("hidden");
  document.getElementById("secretaryLogin").classList.remove("hidden");
}

/* ADD FIELDS */
function addPraising(){
  const container = document.getElementById("praisingContainer");
  const textarea = document.createElement("textarea");
  textarea.placeholder = "Praising Point " + (container.children.length+1);
  container.appendChild(textarea);
}

function addPrayer(){
  const container = document.getElementById("prayerContainer");
  const textarea = document.createElement("textarea");
  textarea.placeholder = "Prayer Point " + (container.children.length+1);
  container.appendChild(textarea);
}

/* SUBMIT */
function submitPrayer(){
  const name = document.getElementById("name").value;
  const month = document.getElementById("userMonth").value;
  const year = document.getElementById("userYear").value;

  const praising = [...document.querySelectorAll("#praisingContainer textarea")]
    .map(t=>t.value).filter(v=>v.trim()!="");

  const prayer = [...document.querySelectorAll("#prayerContainer textarea")]
    .map(t=>t.value).filter(v=>v.trim()!="");

  if(!name || prayer.length===0){
    alert("Please fill required fields.");
    return;
  }

  const prayers = JSON.parse(localStorage.getItem("prayers"));
  prayers.push({name, month, year, praising, prayer});
  localStorage.setItem("prayers", JSON.stringify(prayers));

  document.getElementById("successMsg").innerText="Submitted Successfully!";
  document.getElementById("name").value="";
  initializeFields();
}

/* SECRETARY LOGIN */
function loginSecretary(){
  if(document.getElementById("secPass").value==="admin123"){
    document.getElementById("secretaryLogin").classList.add("hidden");
    document.getElementById("secretaryDashboard").classList.remove("hidden");
  } else alert("Incorrect password");
}

/* FILTER DATA */
function getFilteredData(){
  const prayers=JSON.parse(localStorage.getItem("prayers"));
  const m=document.getElementById("filterMonth").value;
  const y=document.getElementById("filterYear").value;

  return prayers.filter(p=>p.month===m && p.year===y);
}

/* DISPLAY */
function displayData(){
  const filtered=getFilteredData();

  let html="<table><tr><th>Name</th><th>Praising</th><th>Prayer</th></tr>";

  filtered.forEach(p=>{
    html+=`<tr>
      <td>${p.name}</td>
      <td>${p.praising.map(x=>"• "+x).join("<br>")}</td>
      <td>${p.prayer.map(x=>"• "+x).join("<br>")}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("displayArea").innerHTML=html;
}

/* CSV */
function downloadCSV(){
  const filtered=getFilteredData();
  let csv="Name,Praising,Prayer\n";

  filtered.forEach(p=>{
    csv+=`"${p.name}","${p.praising.join(" | ")}","${p.prayer.join(" | ")}"\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="prayer_data.csv";
  link.click();
}

/* PDF */
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const filtered=getFilteredData();

  let y=10;
  doc.text("Prayer Management System - NITW EU",10,y);
  y+=10;

  filtered.forEach(p=>{
    doc.text("Name: "+p.name,10,y); y+=6;
    doc.text("Praising:",10,y); y+=6;
    p.praising.forEach(pt=>{ doc.text("- "+pt,15,y); y+=6; });
    doc.text("Prayer:",10,y); y+=6;
    p.prayer.forEach(pt=>{ doc.text("- "+pt,15,y); y+=6; });
    y+=6;
    if(y>270){ doc.addPage(); y=10; }
  });

  doc.save("prayer_data.pdf");
}

</script>

</body>
</html>
